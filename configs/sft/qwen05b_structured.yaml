defaults:
  - base

# Project 1: SFT — structured output on Qwen2.5-0.5B-Instruct
project: "project1_sft"
run_name: "qwen05b-structured-sft-v1"

model:
  primary: "Qwen/Qwen2.5-0.5B-Instruct"

training:
  max_length: 512
  learning_rate: 2.0e-4
  per_device_train_batch_size: 4
  num_train_epochs: 2
  output_dir: "outputs/project1_sft"

data:
  train_path: "data/processed/sft_train.jsonl"
  eval_path:  "data/eval/sft_eval.jsonl"     # fixed from day 1, never shuffled
