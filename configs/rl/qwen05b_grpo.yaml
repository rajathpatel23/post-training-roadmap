defaults:
  - base

# Project 3: GRPO — verifiable task with exact checker
project: "project3_grpo"
run_name: "qwen05b-grpo-v1"

model:
  primary: "Qwen/Qwen2.5-0.5B-Instruct"  # or point to DPO checkpoint

training:
  max_length: 512
  learning_rate: 1.0e-5
  per_device_train_batch_size: 2
  num_train_epochs: 1
  output_dir: "outputs/project3_grpo"

grpo:
  num_generations: 4           # samples per prompt (G in GRPO)
  kl_coef: 0.05
  reward_baseline: "mean"      # subtract group mean as baseline

data:
  train_path: "data/processed/rl_train.jsonl"
  eval_path:  "data/eval/rl_eval.jsonl"
